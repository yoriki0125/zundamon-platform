services:
  # ずんだもん喋らせ台 (Next.js)
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # VOICEVOXはDocker内部ネットワーク経由でアクセス
      VOICEVOX_URL: http://voicevox:50021
      NEXT_PUBLIC_VOICEVOX_URL: http://voicevox:50021
    depends_on:
      voicevox:
        condition: service_healthy
    restart: unless-stopped

  # VOICEVOXエンジン (CPU版)
  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    ports:
      - "50021:50021"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    # GPU版を使う場合は以下に変更:
    # image: voicevox/voicevox_engine:nvidia-ubuntu20.04-latest
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
